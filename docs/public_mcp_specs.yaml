# Public MCP Specifications
# Use these specs to deploy or integrate public MCPs. Format: OpenAPI-style tool definitions.

mcp_servers:
  flight_booking:
    name: Flight Booking
    version: "1.0"
    port: 8010
    url: "http://localhost:8010/mcp"
    description: Search and book flights
    tools:
      - name: search_flights
        description: Search flights by origin, destination IATA codes and date
        inputSchema:
          origin: { type: string, description: "IATA code e.g. JFK" }
          destination: { type: string, description: "IATA code e.g. LHR" }
          date: { type: string, format: date }
      - name: book_flight
        description: Book a flight by flight_id and passenger details
        inputSchema:
          flight_id: { type: string }
          passenger_name: { type: string }
          passenger_email: { type: string }

  hotel_booking:
    name: Hotel Booking
    port: 8011
    url: "http://localhost:8011/mcp"
    tools:
      - name: search_hotels
      - name: book_hotel

